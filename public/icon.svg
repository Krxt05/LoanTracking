<svg xmlns="http://www.w3.org/2000/svg" viewBox="270 60 140 140" width="512" height="512" role="img">
  <title>Pocket Bank</title>

  <defs>
    <clipPath id="iconclip">
      <rect x="270" y="60" width="140" height="140" rx="34"/>
    </clipPath>
    <mask id="text-gap" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="680" height="320" fill="white"/>
      <rect x="318.27" y="102.5" width="43.52" height="63" fill="black" rx="2"/>
    </mask>
  </defs>

  <!-- Background rounded square -->
  <rect x="270" y="60" width="140" height="140" rx="34" fill="#181815"/>

  <!-- Concentric circle rings (top-left decoration) -->
  <circle cx="310" cy="100" r="88" fill="#222220" clip-path="url(#iconclip)"/>
  <circle cx="310" cy="100" r="66" fill="#2a2a26" clip-path="url(#iconclip)"/>
  <circle cx="310" cy="100" r="44" fill="#323230" clip-path="url(#iconclip)"/>

  <!-- Gold arc sweeps -->
  <path d="M340 172 A52 52 0 0 0 392 120"
        fill="none" stroke="#e8b84b" stroke-width="5" stroke-linecap="round"
        clip-path="url(#iconclip)"/>
  <path d="M340 172 A36 36 0 0 0 376 136"
        fill="none" stroke="#e8b84b" stroke-width="2.5" stroke-linecap="round" opacity="0.4"
        clip-path="url(#iconclip)" mask="url(#text-gap)"/>

  <!-- P monogram -->
  <text x="340" y="152" text-anchor="middle"
        font-family="Georgia, serif" font-size="52" font-weight="700"
        fill="#ffffff" letter-spacing="-1">P</text>

  <!-- Gold accent dot -->
  <circle cx="392" cy="182" r="5" fill="#e8b84b"/>
</svg>
